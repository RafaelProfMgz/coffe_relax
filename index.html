<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>~/.vim/cafe.rc</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

        <style>
            :root {
                --bg-hard: #f9f5d7;
                --bg0: #fbf1c7;
                --bg1: #ebdbb2;
                --bg2: #d5c4a1;
                --fg: #3c3836;
                --fg-light: #7c6f64;
                --red: #cc241d;
                --green: #98971a;
                --yellow: #d79921;
                --blue: #458588;
                --purple: #b16286;
                --aqua: #689d6a;
                --orange: #d65d0e;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
            }

            body {
                background-color: var(--bg-hard);
                color: var(--fg);
                font-family: "Fira Code", monospace;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                overflow: hidden;
                position: relative;
                transition: background-color 0.8s ease;
            }

            #start-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--bg-hard);
                z-index: 9999;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                cursor: pointer;
            }

            .cursor-blink {
                display: inline-block;
                width: 12px;
                height: 20px;
                background-color: var(--fg);
                vertical-align: middle;
                animation: blink 1s step-end infinite;
            }

            @keyframes blink {
                50% {
                    opacity: 0;
                }
            }

            /* --- BOTÃO FLUTUANTE DE NOTA --- */
            .btn-floating {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 1000;
                background-color: var(--green);
                color: var(--bg0);
                border: 2px solid var(--fg);
                padding: 10px 20px;
                border-radius: 4px;
                cursor: pointer;
                font-weight: bold;
                font-family: inherit;
                font-size: 1rem;
                box-shadow: 4px 4px 0px var(--fg);
                transition:
                    all 0.1s,
                    opacity 0.5s ease;
            }
            .btn-floating:active {
                transform: translate(4px, 4px);
                box-shadow: none;
            }

            /* --- CONTAINER VIM --- */
            .container {
                background-color: var(--bg0);
                padding: 40px;
                border-radius: 8px;
                border: 2px solid var(--bg2);
                box-shadow: 12px 12px 0px var(--bg2);
                width: 480px;
                opacity: 0;
                transform: translateY(20px);
                transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
                z-index: 10;
            }
            .container.visible {
                opacity: 1;
                transform: translateY(0);
            }

            body.focus-mode .container header,
            body.focus-mode .container .switches,
            body.focus-mode .terminal-log {
                opacity: 0.2;
                transition: opacity 0.5s;
            }
            body.focus-mode .container header:hover,
            body.focus-mode .container .switches:hover {
                opacity: 1;
            }

            /* MODO FOCO: ESCONDER NOTAS E BOTÃO */
            body.focus-mode .note,
            body.focus-mode .btn-floating {
                opacity: 0;
                pointer-events: none;
            }

            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
                border-bottom: 2px dashed var(--bg2);
                padding-bottom: 10px;
            }

            h1 {
                font-size: 1.2rem;
                color: var(--fg);
            }
            .mode-line {
                font-size: 0.8rem;
                color: var(--fg-light);
            }

            .keypad {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
                margin-bottom: 20px;
            }

            .key {
                background-color: var(--bg1);
                color: var(--fg);
                border: 2px solid var(--bg2);
                padding: 20px 0;
                font-family: inherit;
                font-size: 1.2rem;
                font-weight: bold;
                cursor: pointer;
                border-radius: 4px;
                box-shadow: 4px 4px 0px var(--bg2);
                transition: all 0.05s ease;
            }

            .key.spacebar {
                grid-column: span 3;
                padding: 15px 0;
                border-color: var(--orange);
                color: var(--orange);
                font-size: 0.9rem;
            }
            .key:active,
            .key.active-fake {
                transform: translate(4px, 4px) !important;
                box-shadow: 0px 0px 0px var(--bg2) !important;
                background-color: var(--bg-hard) !important;
            }

            .key:nth-child(1) {
                border-color: var(--red);
                color: var(--red);
            }
            .key:nth-child(2) {
                border-color: var(--green);
                color: var(--green);
            }
            .key:nth-child(3) {
                border-color: var(--yellow);
                color: var(--yellow);
            }
            .key:nth-child(4) {
                border-color: var(--blue);
                color: var(--blue);
            }
            .key:nth-child(5) {
                border-color: var(--purple);
                color: var(--purple);
            }
            .key:nth-child(6) {
                border-color: var(--aqua);
                color: var(--aqua);
            }

            .terminal-log {
                background-color: var(--bg-hard);
                border: 1px solid var(--bg2);
                padding: 10px;
                border-radius: 4px;
                font-size: 0.75rem;
                color: var(--green);
                margin-bottom: 30px;
                height: 35px;
                display: flex;
                align-items: center;
            }

            .switches {
                display: flex;
                justify-content: space-between;
            }
            .switch-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }
            .switch-label {
                font-size: 0.8rem;
                color: var(--fg-light);
                font-weight: 600;
            }

            .toggle {
                appearance: none;
                width: 60px;
                height: 30px;
                background-color: var(--bg2);
                border-radius: 15px;
                position: relative;
                cursor: pointer;
                outline: none;
                box-shadow: inset 4px 4px 5px rgba(0, 0, 0, 0.05);
                transition: background-color 0.3s;
            }

            .toggle::after {
                content: "";
                position: absolute;
                top: 3px;
                left: 3px;
                width: 24px;
                height: 24px;
                background-color: var(--bg-hard);
                border-radius: 50%;
                border: 2px solid var(--fg-light);
                box-shadow: 2px 2px 0px var(--fg-light);
                transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            }
            .toggle:checked {
                background-color: var(--orange);
            }
            .toggle:checked::after {
                left: 33px;
                border-color: var(--fg);
                box-shadow: -2px 2px 0px rgba(0, 0, 0, 0.2);
            }

            /* --- ESTILOS DAS NOTAS --- */
            .note {
                position: absolute;
                width: 240px;
                border: 2px solid var(--fg);
                box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.1);
                display: flex;
                flex-direction: column;
                touch-action: none;
                transition:
                    transform 0.1s ease,
                    opacity 0.5s ease;
            }

            .note-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px;
                border-bottom: 2px solid var(--fg);
                cursor: grab;
                background-color: rgba(255, 255, 255, 0.2);
            }
            .note-header:active {
                cursor: grabbing;
            }

            .btn-close {
                background: none;
                border: none;
                cursor: pointer;
                color: var(--fg);
                font-weight: bold;
                padding: 2px 6px;
            }

            .note-body {
                width: 100%;
                height: 140px;
                padding: 12px;
                background: transparent;
                border: none;
                resize: none;
                outline: none;
                font-family: "Fira Code", monospace;
                color: var(--fg);
                font-size: 14px;
                line-height: 1.5;
                user-select: text;
            }

            .note-footer {
                padding: 8px 12px;
                border-top: 1px dashed var(--fg-light);
                display: flex;
                gap: 8px;
                align-items: center;
                background: rgba(255, 255, 255, 0.2);
            }

            /* Input de Cor Nativo do HTML */
            input[type="color"] {
                -webkit-appearance: none;
                border: 1px solid var(--fg);
                width: 24px;
                height: 24px;
                border-radius: 4px;
                cursor: pointer;
                padding: 0;
            }
            input[type="color"]::-webkit-color-swatch-wrapper {
                padding: 0;
            }
            input[type="color"]::-webkit-color-swatch {
                border: none;
                border-radius: 3px;
            }
        </style>
    </head>
    <body>
        <div id="start-overlay" onclick="initExperience()">
            <p style="font-size: 1.5rem; margin-bottom: 10px; color: var(--fg)">
                $ ./grind_beans.sh <span class="cursor-blink"></span>
            </p>
            <p style="font-size: 0.9rem; color: var(--fg-light)">
                [Ligue os fones e clique para servir]
            </p>
        </div>

        <button
            class="btn-floating"
            onclick="createNote()"
            onmouseenter="NotesAudio.play('hover')"
        >
            + NOVA NOTA
        </button>

        <div class="container" id="main-ui">
            <header>
                <h1>~/.vim/relax.rc</h1>
                <div class="mode-line">-- VISUAL -- ☕</div>
            </header>

            <div class="keypad">
                <button class="key" data-note="C4">H</button>
                <button class="key" data-note="D4">J</button>
                <button class="key" data-note="E4">K</button>
                <button class="key" data-note="G4">L</button>
                <button class="key" data-note="A4">W</button>
                <button class="key" data-note="C5">B</button>
                <button class="key spacebar" data-note="G3">[ SPACE ]</button>
            </div>

            <div class="terminal-log">
                <span style="color: var(--orange); margin-right: 8px">~</span>
                <span id="log-text">aguardando input...</span>
                <span
                    class="cursor-blink"
                    style="
                        width: 8px;
                        height: 12px;
                        margin-left: 4px;
                        background-color: var(--green);
                    "
                ></span>
            </div>

            <div class="switches">
                <div class="switch-container">
                    <span class="switch-label">Lo-Fi</span>
                    <input type="checkbox" class="toggle" id="toggle-lofi" />
                </div>
                <div class="switch-container">
                    <span class="switch-label">Chuva</span>
                    <input type="checkbox" class="toggle" id="toggle-rain" />
                </div>
                <div class="switch-container">
                    <span class="switch-label">Foco</span>
                    <input type="checkbox" class="toggle" id="toggle-focus" />
                </div>
            </div>
        </div>

        <script>
            let isInitialized = false;
            let globalZIndex = 100;

            // Paleta de cores em tons pastéis (Post-it style)
            const notePalette = [
                "#fef3ba", // Amarelo
                "#a8e6cf", // Menta
                "#ffaaa5", // Rosa/Goiaba
                "#c8d9eb", // Azul
                "#e5c1e5", // Roxo
                "#ffd3b6", // Pêssego
            ];

            const NotesAudio = {
                ctx: null,
                lastPlayTime: 0,
                minInterval: 30,
                init() {
                    if (!this.ctx)
                        this.ctx = new (
                            window.AudioContext || window.webkitAudioContext
                        )();
                    if (this.ctx.state === "suspended") this.ctx.resume();
                },
                play(type) {
                    if (!this.ctx) return;
                    const now = Date.now();
                    if (now - this.lastPlayTime < this.minInterval) return;
                    this.lastPlayTime = now;

                    const ctx = this.ctx;
                    const oscillator = ctx.createOscillator();
                    const gainNode = ctx.createGain();
                    const filter = ctx.createBiquadFilter();

                    oscillator.connect(filter);
                    filter.connect(gainNode);
                    gainNode.connect(ctx.destination);
                    const now_audio = ctx.currentTime;

                    switch (type) {
                        case "click":
                            oscillator.type = "sine";
                            oscillator.frequency.setValueAtTime(800, now_audio);
                            oscillator.frequency.exponentialRampToValueAtTime(
                                400,
                                now_audio + 0.05,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(2000, now_audio);
                            gainNode.gain.setValueAtTime(0.15, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.08,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.08);
                            break;
                        case "hover":
                            oscillator.type = "sine";
                            oscillator.frequency.setValueAtTime(
                                1200,
                                now_audio,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(1500, now_audio);
                            gainNode.gain.setValueAtTime(0.03, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.04,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.04);
                            break;
                        case "success":
                            oscillator.type = "sine";
                            oscillator.frequency.setValueAtTime(523, now_audio);
                            oscillator.frequency.setValueAtTime(
                                659,
                                now_audio + 0.1,
                            );
                            oscillator.frequency.setValueAtTime(
                                784,
                                now_audio + 0.2,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(4000, now_audio);
                            gainNode.gain.setValueAtTime(0.1, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.4,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.4);
                            break;
                        case "pop":
                            oscillator.type = "sine";
                            oscillator.frequency.setValueAtTime(600, now_audio);
                            oscillator.frequency.exponentialRampToValueAtTime(
                                200,
                                now_audio + 0.06,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(2500, now_audio);
                            gainNode.gain.setValueAtTime(0.15, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.1,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.1);
                            break;
                        case "drop":
                            oscillator.type = "sine";
                            oscillator.frequency.setValueAtTime(150, now_audio);
                            oscillator.frequency.exponentialRampToValueAtTime(
                                80,
                                now_audio + 0.1,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(800, now_audio);
                            gainNode.gain.setValueAtTime(0.2, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.15,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.15);
                            break;
                        case "tap":
                            oscillator.type = "sine";
                            oscillator.frequency.setValueAtTime(
                                1000,
                                now_audio,
                            );
                            oscillator.frequency.exponentialRampToValueAtTime(
                                600,
                                now_audio + 0.03,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(3000, now_audio);
                            gainNode.gain.setValueAtTime(0.08, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.05,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.05);
                            break;
                        case "swoosh":
                            oscillator.type = "sawtooth";
                            oscillator.frequency.setValueAtTime(200, now_audio);
                            oscillator.frequency.exponentialRampToValueAtTime(
                                800,
                                now_audio + 0.15,
                            );
                            filter.type = "lowpass";
                            filter.frequency.setValueAtTime(1000, now_audio);
                            filter.frequency.linearRampToValueAtTime(
                                3000,
                                now_audio + 0.1,
                            );
                            gainNode.gain.setValueAtTime(0.05, now_audio);
                            gainNode.gain.exponentialRampToValueAtTime(
                                0.001,
                                now_audio + 0.2,
                            );
                            oscillator.start(now_audio);
                            oscillator.stop(now_audio + 0.2);
                            break;
                    }
                },
            };

            let notesData = [];

            const StorageService = {
                load() {
                    const data = localStorage.getItem("vim-cafe-notes");
                    return data ? JSON.parse(data) : [];
                },
                save() {
                    localStorage.setItem(
                        "vim-cafe-notes",
                        JSON.stringify(notesData),
                    );
                },
            };

            const masterFilter = new Tone.Filter(
                20000,
                "lowpass",
            ).toDestination();
            const keysSynth = new Tone.PolySynth(Tone.FMSynth, {
                harmonicity: 3,
                modulationIndex: 3.5,
                oscillator: { type: "sine" },
                envelope: {
                    attack: 0.01,
                    decay: 1.5,
                    sustain: 0.2,
                    release: 2,
                },
                modulation: { type: "triangle" },
            }).connect(masterFilter);
            keysSynth.volume.value = -12;

            const thockSynth = new Tone.MembraneSynth({
                pitchDecay: 0.008,
                octaves: 2,
                oscillator: { type: "sine" },
                envelope: {
                    attack: 0.001,
                    decay: 0.1,
                    sustain: 0,
                    release: 0.01,
                },
            }).toDestination();
            thockSynth.volume.value = -5;

            const spacebarSynth = new Tone.MembraneSynth({
                pitchDecay: 0.02,
                octaves: 1.5,
                oscillator: { type: "square" },
                envelope: {
                    attack: 0.001,
                    decay: 0.2,
                    sustain: 0,
                    release: 0.05,
                },
            }).toDestination();
            spacebarSynth.volume.value = -8;

            const switchClick = new Tone.NoiseSynth({
                noise: { type: "pink" },
                envelope: { attack: 0.001, decay: 0.05, sustain: 0 },
            }).toDestination();
            switchClick.volume.value = -15;

            const rainNoise = new Tone.Noise("brown").start();
            const rainFilter = new Tone.Filter(400, "lowpass").toDestination();
            rainNoise.connect(rainFilter);
            rainNoise.volume.value = -Infinity;

            const tapeNoise = new Tone.Noise("pink").start();
            const tapeFilter = new Tone.Filter(
                3000,
                "bandpass",
            ).toDestination();
            tapeNoise.connect(tapeFilter);
            tapeNoise.volume.value = -Infinity;

            const vimLogs = [
                ":w cafe.txt",
                ":set relax=true",
                "Compilando grãos...",
                ":PlugInstall paz-interior",
                "GG (indo para o topo)",
                "dd (apagando o estresse)",
                "shift+a (inserindo no final)",
                "Avaliando syntax highlighting...",
                ":q! (ignorando problemas)",
            ];

            async function initExperience() {
                if (isInitialized) return;

                await Tone.start();
                NotesAudio.init();
                isInitialized = true;

                const overlay = document.getElementById("start-overlay");
                overlay.style.opacity = "0";
                setTimeout(() => {
                    overlay.style.display = "none";
                    document.getElementById("main-ui").classList.add("visible");
                }, 500);

                keysSynth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n");

                notesData = StorageService.load();
                notesData.forEach(renderNote);
            }

            function updateTerminal() {
                document.getElementById("log-text").innerText =
                    vimLogs[Math.floor(Math.random() * vimLogs.length)];
            }

            const keys = document.querySelectorAll(".key");
            keys.forEach((key) => {
                key.addEventListener("mousedown", () => {
                    const note = key.getAttribute("data-note");
                    keysSynth.triggerAttackRelease(note, "8n");
                    if (key.classList.contains("spacebar"))
                        spacebarSynth.triggerAttackRelease("E1", "16n");
                    else thockSynth.triggerAttackRelease("C2", "32n");
                    updateTerminal();
                });
                key.addEventListener("mouseup", () => {
                    if (!key.classList.contains("spacebar"))
                        thockSynth.triggerAttackRelease(
                            "C3",
                            "64n",
                            Tone.now(),
                            0.3,
                        );
                });
                key.addEventListener("mouseleave", () => {
                    if (
                        key.matches(":active") &&
                        !key.classList.contains("spacebar")
                    )
                        thockSynth.triggerAttackRelease(
                            "C3",
                            "64n",
                            Tone.now(),
                            0.3,
                        );
                });
            });

            document.querySelectorAll(".toggle").forEach((toggle) => {
                toggle.addEventListener("change", (e) => {
                    switchClick.triggerAttackRelease("16n");
                    thockSynth.triggerAttackRelease(
                        e.target.checked ? "G3" : "E3",
                        "32n",
                    );
                });
            });

            document
                .getElementById("toggle-rain")
                .addEventListener("change", (e) => {
                    e.target.checked
                        ? rainNoise.volume.rampTo(-15, 2)
                        : rainNoise.volume.rampTo(-Infinity, 1);
                });

            document
                .getElementById("toggle-lofi")
                .addEventListener("change", (e) => {
                    if (e.target.checked) {
                        masterFilter.frequency.rampTo(800, 0.5);
                        tapeNoise.volume.rampTo(-25, 1);
                        document.getElementById("log-text").innerText =
                            ":set lo_fi_mode=on";
                    } else {
                        masterFilter.frequency.rampTo(20000, 0.5);
                        tapeNoise.volume.rampTo(-Infinity, 0.5);
                        document.getElementById("log-text").innerText =
                            ":set lo_fi_mode=off";
                    }
                });

            document
                .getElementById("toggle-focus")
                .addEventListener("change", (e) => {
                    if (e.target.checked) {
                        document.body.style.backgroundColor = "var(--bg0)";
                        document.body.classList.add("focus-mode");
                        document.getElementById("log-text").innerText =
                            ":Foco total ativado.";
                    } else {
                        document.body.style.backgroundColor = "var(--bg-hard)";
                        document.body.classList.remove("focus-mode");
                    }
                });

            const keyMap = { h: 0, j: 1, k: 2, l: 3, w: 4, b: 5, " ": 6 };
            document.addEventListener("keydown", (e) => {
                if (
                    ["TEXTAREA", "INPUT"].includes(
                        document.activeElement.tagName,
                    )
                )
                    return;
                const keyChar = e.key.toLowerCase();
                const keyIndex = keyMap[keyChar];

                if (
                    keyIndex !== undefined &&
                    !keys[keyIndex].classList.contains("active-fake")
                ) {
                    if (keyChar === " ") e.preventDefault();
                    keys[keyIndex].classList.add("active-fake");
                    keysSynth.triggerAttackRelease(
                        keys[keyIndex].getAttribute("data-note"),
                        "8n",
                    );

                    if (keyChar === " ")
                        spacebarSynth.triggerAttackRelease("E1", "16n");
                    else thockSynth.triggerAttackRelease("C2", "32n");
                    updateTerminal();
                }
            });

            document.addEventListener("keyup", (e) => {
                if (
                    ["TEXTAREA", "INPUT"].includes(
                        document.activeElement.tagName,
                    )
                )
                    return;
                const keyIndex = keyMap[e.key.toLowerCase()];
                if (keyIndex !== undefined) {
                    keys[keyIndex].classList.remove("active-fake");
                    if (e.key !== " ")
                        thockSynth.triggerAttackRelease(
                            "C3",
                            "64n",
                            Tone.now(),
                            0.3,
                        );
                }
            });

            // Função que escolhe uma cor inteligente para a nova nota
            function getNextColor() {
                // Pegar todas as cores atualmente em uso (convertendo para minúsculas pra evitar bugs)
                const usedColors = notesData.map((n) => n.color.toLowerCase());

                // Filtrar a paleta: encontrar as cores que AINDA NÃO estão sendo usadas
                const availableColors = notePalette.filter(
                    (color) => !usedColors.includes(color.toLowerCase()),
                );

                if (availableColors.length > 0) {
                    // Pega uma cor aleatória dentre as disponíveis
                    return availableColors[
                        Math.floor(Math.random() * availableColors.length)
                    ];
                } else {
                    // Se todas já foram usadas, escolhe uma aleatória da paleta inteira
                    return notePalette[
                        Math.floor(Math.random() * notePalette.length)
                    ];
                }
            }

            function createNote() {
                NotesAudio.play("success");

                const newNote = {
                    id: Date.now().toString(),
                    text: "",
                    x: window.innerWidth / 2 - 120 + (Math.random() * 40 - 20),
                    y: window.innerHeight / 2 - 100 + (Math.random() * 40 - 20),
                    color: getNextColor(), // Puxa a cor inteligente aqui!
                };
                notesData.push(newNote);
                StorageService.save();
                renderNote(newNote);
            }

            function renderNote(noteData) {
                noteData.color = noteData.color || notePalette[0]; // Falback seguro

                const noteEl = document.createElement("div");
                noteEl.className = "note";
                noteEl.style.left = `${noteData.x}px`;
                noteEl.style.top = `${noteData.y}px`;
                noteEl.style.backgroundColor = noteData.color;

                globalZIndex++;
                noteEl.style.zIndex = globalZIndex;

                noteEl.innerHTML = `
                    <div class="note-header">
                        <span style="font-size: 10px; color: var(--fg); font-weight: bold;">-- INSERT --</span>
                        <button class="btn-close">✖</button>
                    </div>
                    <textarea class="note-body" spellcheck="false" placeholder="Digite algo relaxante...">${noteData.text}</textarea>
                    <div class="note-footer">
                        <span style="font-size: 10px; font-weight: bold;">Cor:</span>
                        <input
                            type="color"
                            class="cor-nota"
                            name="background"
                            value="${noteData.color}"
                            colorspace="display-p3"
                            alpha
                        />
                    </div>
                `;

                // Traz pro topo ao clicar
                noteEl.addEventListener("mousedown", () => {
                    globalZIndex++;
                    noteEl.style.zIndex = globalZIndex;
                });

                // Deletar a nota
                noteEl
                    .querySelector(".btn-close")
                    .addEventListener("mousedown", (e) => {
                        e.stopPropagation();
                        NotesAudio.play("swoosh");
                        noteEl.remove();
                        notesData = notesData.filter(
                            (n) => n.id !== noteData.id,
                        );
                        StorageService.save();
                    });

                // SELETOR DE COR
                const seletorDeCor = noteEl.querySelector(".cor-nota");
                seletorDeCor.addEventListener("input", function (e) {
                    noteEl.style.backgroundColor = e.target.value;
                    const notaParaSalvar = notesData.find(
                        (n) => n.id === noteData.id,
                    );
                    if (notaParaSalvar) {
                        notaParaSalvar.color = e.target.value;
                        StorageService.save();
                    }
                });

                const textarea = noteEl.querySelector(".note-body");
                textarea.addEventListener("input", (e) => {
                    const notaParaSalvar = notesData.find(
                        (n) => n.id === noteData.id,
                    );
                    if (notaParaSalvar) {
                        notaParaSalvar.text = e.target.value;
                        StorageService.save();
                    }
                });
                textarea.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") NotesAudio.play("tap");
                    else if (e.key === "Backspace") NotesAudio.play("swoosh");
                    else NotesAudio.play("click");
                });

                // LÓGICA DE DRAG
                const header = noteEl.querySelector(".note-header");
                header.addEventListener("mousedown", (e) => {
                    if (e.target.tagName === "BUTTON") return;

                    NotesAudio.play("pop");

                    let startX = e.clientX;
                    let startY = e.clientY;
                    let initialLeft = noteEl.offsetLeft;
                    let initialTop = noteEl.offsetTop;

                    noteEl.style.transform = "scale(1.02)";

                    const onMouseMove = (moveEvent) => {
                        const dx = moveEvent.clientX - startX;
                        const dy = moveEvent.clientY - startY;
                        noteEl.style.left = `${initialLeft + dx}px`;
                        noteEl.style.top = `${initialTop + dy}px`;
                    };

                    const onMouseUp = () => {
                        NotesAudio.play("drop");
                        noteEl.style.transform = "scale(1)";

                        document.removeEventListener("mousemove", onMouseMove);
                        document.removeEventListener("mouseup", onMouseUp);

                        const noteRef = notesData.find(
                            (n) => n.id === noteData.id,
                        );
                        if (noteRef) {
                            noteRef.x = noteEl.offsetLeft;
                            noteRef.y = noteEl.offsetTop;
                            StorageService.save();
                        }
                    };

                    document.addEventListener("mousemove", onMouseMove);
                    document.addEventListener("mouseup", onMouseUp);
                });

                document.body.appendChild(noteEl);
            }
        </script>
    </body>
</html>
